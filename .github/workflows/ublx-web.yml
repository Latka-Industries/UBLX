# Equivalent of `mise run web-check` — only when crates/ublx-web changes.
name: UBLX Web

on:
  push:
    branches: [main, master]
    paths:
      - "crates/ublx-web/**"
      - ".github/workflows/ublx-web.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "crates/ublx-web/**"
      - ".github/workflows/ublx-web.yml"

jobs:
  web-check:
    name: web-check (fmt + clippy wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          prefix-key: ublx-web-wasm

      - name: Check formatting
        run: cargo fmt -p ublx-web -- --check

      - name: Clippy (wasm32)
        run: cargo clippy -p ublx-web --target wasm32-unknown-unknown -- -D warnings
