name: Feature Request
description: Suggest a new capability or improvement for UBLX
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first, then the change you want. Link related roadmap items if you know them.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what's missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should UBLX behave? TUI, CLI, config, or export changes welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or simpler approaches you thought about.

  - type: checkboxes
    id: scope
    attributes:
      label: Likely area (optional)
      options:
        - label: TUI / viewer / previews
        - label: Indexing / snapshot / Delta
        - label: Lenses
        - label: Configuration
        - label: CLI / headless / export
        - label: Performance / scale
        - label: Themes / UX
        - label: Docs
